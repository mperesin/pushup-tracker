<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Family Push-Up Crew</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; color: #e8e8e8; font-family: 'DM Mono', monospace; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    @keyframes confettiFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
    @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes celebrate { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading { min-height:100vh; display:flex; align-items:center; justify-content:center; font-size:28px; letter-spacing:3px; color:#f59e0b; font-family:'Bebas Neue',sans-serif; }
    .quickbtn:hover { border-color: var(--my-color) !important; color: var(--my-color) !important; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="root"></div>
<script>
// ── Firebase ───────────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyDrpf1Io68kKQ3_PiGUQnKb5CoVa0MVBO8",
  authDomain: "pushups-for-life.firebaseapp.com",
  projectId: "pushups-for-life",
  storageBucket: "pushups-for-life.firebasestorage.app",
  messagingSenderId: "1048355531576",
  appId: "1:1048355531576:web:7d91a48efb580e8be6afcd"
});
const db = firebase.firestore();

// ── Helpers ────────────────────────────────────────────────────────────────
const SESSION_KEY = “family-pushup-session”;
const COLORS = [”#f59e0b”,”#3b82f6”,”#f43f5e”,”#a855f7”,”#10b981”,”#fb923c”,”#06b6d4”,”#ec4899”];
function getSession() { return localStorage.getItem(SESSION_KEY) || null; }
function setSession(n) { localStorage.setItem(SESSION_KEY, n); }
function clearSession() { localStorage.removeItem(SESSION_KEY); }
function todayKey() { return new Date().toISOString().split(“T”)[0]; }
function memberColor(name, allNames) { return COLORS[allNames.slice().sort().indexOf(name) % COLORS.length]; }
function el(tag, props={}, …children) {
const e = document.createElement(tag);
Object.entries(props).forEach(([k,v]) => {
if (k === ‘style’ && typeof v === ‘object’) Object.assign(e.style, v);
else if (k.startsWith(‘on’)) e.addEventListener(k.slice(2).toLowerCase(), v);
else if (k === ‘className’) e.className = v;
else e.setAttribute(k, v);
});
children.flat().forEach(c => c != null && e.appendChild(typeof c === ‘string’ ? document.createTextNode(c) : c));
return e;
}
function s(styles) { return styles; }

// ── State ──────────────────────────────────────────────────────────────────
let shared = { users:{}, groupChallenge:{ goal:1000, name:“Family Challenge” } };
let currentUser = getSession();
let currentView = “today”;
let repInput = “”;
let justCelebrated = false;
let prevTodayCount = 0;

// ── Firebase sync ──────────────────────────────────────────────────────────
async function saveToFirebase() {
await db.collection(“family”).doc(“shared”).set(shared);
}

function startListening() {
db.collection(“family”).doc(“shared”).onSnapshot(snap => {
if (snap.exists) {
shared = snap.data();
}
render();
});
}

// ── Confetti ───────────────────────────────────────────────────────────────
function showConfetti() {
const colors = [”#f59e0b”,”#10b981”,”#3b82f6”,”#f43f5e”,”#a855f7”,”#fff”,”#fb923c”];
const container = el(‘div’, {style:s({position:‘fixed’,inset:‘0’,pointerEvents:‘none’,zIndex:‘200’})});
for(let i=0;i<36;i++){
const piece = el(‘div’,{style:s({
position:‘absolute’, left:`${Math.random()*100}%`, top:’-20px’,
width:`${6+Math.random()*9}px`, height:`${6+Math.random()*9}px`,
borderRadius: Math.random()>0.5?‘50%’:‘2px’,
background: colors[Math.floor(Math.random()*colors.length)],
animation:`confettiFall ${1.5+Math.random()*1.5}s ${Math.random()*0.6}s ease-in forwards`,
transform:`rotate(${Math.random()*360}deg)`
})});
container.appendChild(piece);
}
document.body.appendChild(container);
setTimeout(()=>container.remove(), 4000);
}

// ── Avatar ─────────────────────────────────────────────────────────────────
function Avatar(name, color, size=32) {
return el(‘div’,{style:s({width:size+‘px’,height:size+‘px’,borderRadius:‘50%’,background:color,flexShrink:‘0’,display:‘flex’,alignItems:‘center’,justifyContent:‘center’,fontFamily:”‘Bebas Neue’”,fontSize:(size*0.55)+‘px’,color:’#000’})}, name[0].toUpperCase());
}

// ── StatCard ───────────────────────────────────────────────────────────────
function StatCard(label, value, unit, color=’#f59e0b’) {
return el(‘div’,{style:s({background:’#0f0f0f’,border:‘1px solid #1e1e1e’,borderRadius:‘12px’,padding:‘16px’})},
el(‘div’,{style:s({fontSize:‘10px’,color:’#444’,letterSpacing:‘0.12em’,marginBottom:‘6px’})},label.toUpperCase()),
el(‘div’,{style:s({fontFamily:”‘Bebas Neue’”,fontSize:‘28px’,color,lineHeight:‘1’})},String(value)),
el(‘div’,{style:s({fontSize:‘10px’,color:’#555’,marginTop:‘2px’})},unit)
);
}

// ── Bar ────────────────────────────────────────────────────────────────────
function BarChart(value, max, color, label, goal) {
const h = max>0 ? Math.max((value/max)*100, value>0?4:0) : 0;
const hit = goal && value>=goal;
return el(‘div’,{style:s({display:‘flex’,flexDirection:‘column’,alignItems:‘center’,gap:‘4px’,flex:‘1’})},
el(‘div’,{style:s({fontSize:‘11px’,color:value>0?(hit?’#10b981’:color):’#333’,fontFamily:‘monospace’})},value>0?String(value):’’),
el(‘div’,{style:s({width:‘100%’,height:‘80px’,display:‘flex’,alignItems:‘flex-end’,justifyContent:‘center’})},
el(‘div’,{style:s({width:‘62%’,height:`${h}%`,background:hit?’#10b981’:color,borderRadius:‘4px 4px 0 0’,transition:‘height 0.5s ease’,minHeight:value>0?‘4px’:‘0’})})
),
el(‘div’,{style:s({fontSize:‘10px’,color:’#666’,textAlign:‘center’,maxWidth:‘40px’,overflow:‘hidden’,textOverflow:‘ellipsis’,whiteSpace:‘nowrap’})},label)
);
}

// ── Get stats ──────────────────────────────────────────────────────────────
function getStats() {
const log = (shared.users[currentUser]||{}).log || {};
const now = new Date();
const week = Array.from({length:7},(*,i)=>{
const d=new Date(now); d.setDate(d.getDate()-(6-i));
const k=d.toISOString().split(“T”)[0];
return {label:[“Sun”,“Mon”,“Tue”,“Wed”,“Thu”,“Fri”,“Sat”][d.getDay()],count:log[k]||0,key:k};
});
const weeks = Array.from({length:4},(*,i)=>{
const s2=new Date(now); s2.setDate(s2.getDate()-s2.getDay()-i*7);
let total=0;
for(let j=0;j<7;j++){const d=new Date(s2);d.setDate(s2.getDate()+j);total+=log[d.toISOString().split(“T”)[0]]||0;}
return {label:`W${4-i}`,total};
}).reverse();
const monthTotal = Array.from({length:now.getDate()},(*,i)=>{
const d=new Date(now.getFullYear(),now.getMonth(),i+1);
return log[d.toISOString().split(“T”)[0]]||0;
}).reduce((a,b)=>a+b,0);
const yearMonths = Array.from({length:now.getMonth()+1},(*,m)=>{
let total=0; const days=new Date(now.getFullYear(),m+1,0).getDate();
for(let d=1;d<=days;d++) total+=log[`${now.getFullYear()}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`]||0;
return {label:[“Jan”,“Feb”,“Mar”,“Apr”,“May”,“Jun”,“Jul”,“Aug”,“Sep”,“Oct”,“Nov”,“Dec”][m],total};
});
return {week,weeks,monthTotal,yearTotal:yearMonths.reduce((a,b)=>a+b.total,0),yearMonths};
}

// ── Update my data ─────────────────────────────────────────────────────────
async function updateMy(fn) {
const prev = shared.users[currentUser] || {goal:50,log:{}};
shared = {…shared, users:{…shared.users, [currentUser]:fn(prev)}};
await saveToFirebase();
}

// ── Login screen ───────────────────────────────────────────────────────────
function renderLogin() {
const allNames = Object.keys(shared.users);
const wrap = el(‘div’,{style:s({minHeight:‘100vh’,background:’#0a0a0a’,display:‘flex’,flexDirection:‘column’,alignItems:‘center’,justifyContent:‘center’,padding:‘32px 24px’,fontFamily:”‘DM Mono’,monospace”})});
const inner = el(‘div’,{style:s({width:‘100%’,maxWidth:‘380px’,animation:‘fadeUp 0.5s ease’})});

inner.appendChild(el(‘div’,{style:s({fontSize:‘11px’,letterSpacing:‘0.2em’,color:’#555’,marginBottom:‘4px’})},‘FAMILY’));
inner.appendChild(el(‘div’,{style:s({fontFamily:”‘Bebas Neue’”,fontSize:‘58px’,color:’#f59e0b’,lineHeight:‘1’,marginBottom:‘6px’})},‘PUSH-UP CREW’));
inner.appendChild(el(‘div’,{style:s({fontSize:‘12px’,color:’#333’,marginBottom:‘36px’})},‘Track together. Push harder.’));

let mode = allNames.length > 0 ? ‘existing’ : ‘new’;

const modeContainer = el(‘div’,{style:s({display:‘flex’,gap:‘8px’,marginBottom:‘28px’})});
const formArea = el(‘div’);

function renderModeButtons() {
modeContainer.innerHTML = ‘’;
if(allNames.length === 0) return;
[‘existing’,‘new’].forEach(m => {
const btn = el(‘button’,{
style:s({flex:‘1’,padding:‘10px’,border:‘none’,borderRadius:‘8px’,background:mode===m?’#f59e0b’:’#111’,color:mode===m?’#000’:’#555’,fontFamily:‘inherit’,fontSize:‘11px’,fontWeight:‘700’,letterSpacing:‘0.12em’,cursor:‘pointer’,textTransform:‘uppercase’}),
onClick:()=>{ mode=m; renderModeButtons(); renderForm(); }
}, m===‘new’?‘New member’:‘Sign back in’);
modeContainer.appendChild(btn);
});
}

function renderForm() {
formArea.innerHTML = ‘’;
if(mode===‘new’) {
const label = el(‘div’,{style:s({fontSize:‘11px’,color:’#444’,letterSpacing:‘0.15em’,marginBottom:‘10px’})},‘YOUR NAME’);
const row = el(‘div’,{style:s({display:‘flex’,gap:‘10px’})});
const input = el(‘input’,{type:‘text’,placeholder:‘Dad, Mom, Alex…’,style:s({flex:‘1’,background:’#111’,border:‘1px solid #2a2a2a’,color:’#fff’,fontFamily:‘inherit’,fontSize:‘16px’,padding:‘14px 16px’,borderRadius:‘12px’,outline:‘none’})});
const btn = el(‘button’,{style:s({background:’#f59e0b’,border:‘none’,color:’#000’,fontWeight:‘700’,fontSize:‘20px’,padding:‘0 20px’,borderRadius:‘12px’,cursor:‘pointer’}),
onClick:()=>{ const n=input.value.trim(); if(n) doLogin(n); }
},‘→’);
input.addEventListener(‘keydown’, e=>{ if(e.key===‘Enter’&&input.value.trim()) doLogin(input.value.trim()); });
row.append(input,btn);
formArea.append(label,row);
setTimeout(()=>input.focus(),100);
} else {
formArea.appendChild(el(‘div’,{style:s({fontSize:‘11px’,color:’#444’,letterSpacing:‘0.15em’,marginBottom:‘8px’})},‘WHO ARE YOU?’));
allNames.forEach((u,i)=>{
const btn = el(‘button’,{
style:s({display:‘flex’,alignItems:‘center’,gap:‘14px’,padding:‘14px 18px’,background:’#0d0d0d’,border:‘1px solid #1e1e1e’,borderRadius:‘12px’,color:’#e8e8e8’,fontFamily:‘inherit’,fontSize:‘15px’,cursor:‘pointer’,textAlign:‘left’,width:‘100%’,marginBottom:‘8px’}),
onClick:()=>doLogin(u)
}, Avatar(u,COLORS[i%COLORS.length],36), u);
btn.addEventListener(‘mouseenter’,()=>btn.style.borderColor=COLORS[i%COLORS.length]);
btn.addEventListener(‘mouseleave’,()=>btn.style.borderColor=’#1e1e1e’);
formArea.appendChild(btn);
});
}
}

renderModeButtons();
renderForm();
inner.append(modeContainer, formArea);
wrap.appendChild(inner);
return wrap;
}

async function doLogin(name) {
setSession(name);
currentUser = name;
justCelebrated = false;
prevTodayCount = 0;
if(!shared.users[name]) {
shared = {…shared, users:{…shared.users,[name]:{goal:50,log:{}}}};
await saveToFirebase();
}
render();
}

// ── Nav ────────────────────────────────────────────────────────────────────
function renderNav(myColor) {
const nav = el(‘div’,{style:s({display:‘flex’,gap:‘2px’,margin:‘16px 20px 0’,background:’#111’,borderRadius:‘8px’,padding:‘3px’,width:‘calc(100% - 40px)’,maxWidth:‘414px’})});
[‘today’,‘week’,‘month’,‘year’,‘crew’].forEach(v=>{
const active = currentView===v;
const btn = el(‘button’,{
style:s({flex:‘1’,padding:‘8px 0’,border:‘none’,borderRadius:‘6px’,background:active?(v===‘crew’?myColor:’#f59e0b’):‘transparent’,color:active?’#0a0a0a’:(v===‘crew’?myColor:’#555’),fontFamily:‘inherit’,fontSize:‘10px’,fontWeight:‘700’,letterSpacing:‘0.08em’,cursor:‘pointer’,textTransform:‘uppercase’,transition:‘all 0.2s’}),
onClick:()=>{ currentView=v; render(); }
}, v===‘crew’?‘👥’:v);
nav.appendChild(btn);
});
return nav;
}

// ── Today view ─────────────────────────────────────────────────────────────
function renderToday(myColor) {
const myData = shared.users[currentUser] || {goal:50,log:{}};
const today = todayKey();
const todayCount = myData.log[today]||0;
const goal = myData.goal||50;
const pct = Math.min((todayCount/goal)*100,100);
const goalHit = todayCount>=goal;

if(todayCount>=goal && prevTodayCount<goal && !justCelebrated) {
justCelebrated=true; showConfetti();
}
prevTodayCount=todayCount;

const wrap = el(‘div’,{style:s({width:‘100%’,maxWidth:‘420px’,padding:‘20px 20px 0’,animation:‘slideUp 0.3s ease’})});

// Goal row
const goalRow = el(‘div’,{style:s({display:‘flex’,justifyContent:‘space-between’,alignItems:‘center’,marginBottom:‘16px’})});
goalRow.appendChild(el(‘div’,{style:s({fontSize:‘12px’,color:’#444’})},‘DAILY GOAL’));
const goalBtn = el(‘button’,{style:s({background:‘none’,border:‘1px solid #2a2a2a’,color:myColor,fontFamily:‘inherit’,fontSize:‘20px’,fontWeight:‘700’,padding:‘2px 16px’,borderRadius:‘8px’,cursor:‘pointer’})},String(goal)+’ ✎’);
goalBtn.addEventListener(‘click’,()=>{
const n=prompt(‘Set new daily goal:’,String(goal));
const g=parseInt(n);
if(g>0){ updateMy(d=>({…d,goal:g})); justCelebrated=false; }
});
goalRow.appendChild(goalBtn);
wrap.appendChild(goalRow);

// Big number
const bigNum = el(‘div’,{style:s({textAlign:‘center’,padding:‘24px 0 18px’,animation:goalHit?‘celebrate 0.7s ease infinite’:‘none’})},
el(‘div’,{style:s({fontFamily:”‘Bebas Neue’”,fontSize:‘96px’,lineHeight:‘1’,color:goalHit?’#10b981’:myColor,textShadow:goalHit?‘0 0 40px #10b98144’:`0 0 40px ${myColor}22`,transition:‘all 0.4s’})},String(todayCount)),
el(‘div’,{style:s({fontSize:‘12px’,color:’#444’,letterSpacing:‘0.15em’})},‘REPS TODAY’)
);
wrap.appendChild(bigNum);

// Progress bar
const barWrap = el(‘div’,{style:s({background:’#1a1a1a’,borderRadius:‘12px’,height:‘12px’,overflow:‘hidden’,marginBottom:‘8px’})});
barWrap.appendChild(el(‘div’,{style:s({height:‘100%’,width:`${pct}%`,background:goalHit?‘linear-gradient(90deg,#10b981,#34d399)’:`linear-gradient(90deg,${myColor},${myColor}bb)`,borderRadius:‘12px’,transition:‘width 0.5s ease’})}));
wrap.appendChild(barWrap);
wrap.appendChild(el(‘div’,{style:s({display:‘flex’,justifyContent:‘space-between’,fontSize:‘10px’,color:’#444’,marginBottom:‘22px’})},
el(‘span’,{},`${Math.round(pct)}% complete`),
el(‘span’,{},`${Math.max(goal-todayCount,0)} to go`)
));

// Celebration
if(goalHit){
wrap.appendChild(el(‘div’,{style:s({background:‘linear-gradient(135deg,#052e16,#064e3b)’,border:‘1px solid #10b98133’,borderRadius:‘16px’,padding:‘20px 24px’,marginBottom:‘22px’,textAlign:‘center’})},
el(‘div’,{style:s({fontSize:‘28px’,marginBottom:‘4px’})},‘🏆’),
el(‘div’,{style:s({fontFamily:”‘Bebas Neue’”,fontSize:‘22px’,color:’#10b981’,letterSpacing:‘2px’})},‘GOAL CRUSHED!’),
el(‘div’,{style:s({fontSize:‘12px’,color:’#6ee7b7’,marginTop:‘4px’})},todayCount>goal?`${todayCount-goal} reps above your goal. Beast mode.`:‘You hit your target. Well done!’)
));
}

// Input row
const inputRow = el(‘div’,{style:s({display:‘flex’,gap:‘10px’,marginBottom:‘14px’})});
const repInputEl = el(‘input’,{type:‘number’,placeholder:‘Add reps…’,style:s({flex:‘1’,background:’#111’,border:‘1px solid #2a2a2a’,color:’#fff’,fontFamily:‘inherit’,fontSize:‘18px’,padding:‘14px 16px’,borderRadius:‘12px’,outline:‘none’})});
repInputEl.addEventListener(‘input’,e=>repInput=e.target.value);
repInputEl.value = repInput;
const addBtn = el(‘button’,{style:s({background:myColor,border:‘none’,color:’#000’,fontWeight:‘700’,fontSize:‘22px’,padding:‘0 24px’,borderRadius:‘12px’,cursor:‘pointer’,fontFamily:‘inherit’}),
onClick:()=>{ const n=parseInt(repInputEl.value); if(n>0){updateMy(d=>({…d,log:{…d.log,[today]:(d.log[today]||0)+n}}));repInput=’’;repInputEl.value=’’; } }
},’+’);
repInputEl.addEventListener(‘keydown’,e=>{ if(e.key===‘Enter’){ const n=parseInt(repInputEl.value); if(n>0){updateMy(d=>({…d,log:{…d.log,[today]:(d.log[today]||0)+n}}));repInput=’’;repInputEl.value=’’;} }});
inputRow.append(repInputEl,addBtn);
wrap.appendChild(inputRow);

// Quick add
const quickRow = el(‘div’,{style:s({display:‘flex’,gap:‘8px’,marginBottom:‘24px’})});
[5,10,15,20,25].forEach(n=>{
const btn = el(‘button’,{style:s({flex:‘1’,padding:‘10px 0’,background:’#111’,border:‘1px solid #2a2a2a’,color:’#666’,fontFamily:‘inherit’,fontSize:‘12px’,borderRadius:‘8px’,cursor:‘pointer’}),
onClick:()=>updateMy(d=>({…d,log:{…d.log,[today]:(d.log[today]||0)+n}}))
},`+${n}`);
btn.addEventListener(‘mouseenter’,()=>{btn.style.borderColor=myColor;btn.style.color=myColor;});
btn.addEventListener(‘mouseleave’,()=>{btn.style.borderColor=’#2a2a2a’;btn.style.color=’#666’;});
quickRow.appendChild(btn);
});
wrap.appendChild(quickRow);

// Reset
wrap.appendChild(el(‘button’,{style:s({width:‘100%’,padding:‘10px’,background:‘none’,border:‘1px solid #181818’,color:’#2a2a2a’,fontFamily:‘inherit’,fontSize:‘11px’,letterSpacing:‘0.15em’,borderRadius:‘8px’,cursor:‘pointer’}),
onClick:()=>{ if(confirm(‘Reset today?’)){ updateMy(d=>({…d,log:{…d.log,[today]:0}})); justCelebrated=false; } }
},‘RESET TODAY’));

return wrap;
}

// ── Week view ──────────────────────────────────────────────────────────────
function renderWeek(myColor) {
const {week} = getStats();
const myData = shared.users[currentUser]||{goal:50,log:{}};
const goal = myData.goal||50;
const today = todayKey();
const total = week.reduce((a,b)=>a+b.count,0);
const wrap = el(‘div’,{style:s({width:‘100%’,maxWidth:‘420px’,padding:‘24px 20px 0’,animation:‘slideUp 0.3s ease’})});
wrap.appendChild(el(‘div’,{style:s({fontSize:‘11px’,color:’#444’,letterSpacing:‘0.15em’,marginBottom:‘4px’})},‘THIS WEEK’));
wrap.appendChild(el(‘div’,{style:s({fontFamily:”‘Bebas Neue’”,fontSize:‘40px’,color:myColor,marginBottom:‘24px’})},`${total} REPS`));
const bars = el(‘div’,{style:s({display:‘flex’,gap:‘6px’,alignItems:‘flex-end’,background:’#0f0f0f’,borderRadius:‘16px’,padding:‘20px 16px 12px’})});
week.forEach(d=>bars.appendChild(BarChart(d.count,Math.max(…week.map(x=>x.count),goal),d.key===today?myColor:myColor+‘55’,d.label,goal)));
wrap.appendChild(bars);
const grid = el(‘div’,{style:s({marginTop:‘24px’,display:‘grid’,gridTemplateColumns:‘1fr 1fr’,gap:‘12px’})});
grid.append(StatCard(‘Weekly total’,total,‘reps’,myColor),StatCard(‘Daily avg’,Math.round(total/7),‘reps/day’,myColor),StatCard(‘Best day’,Math.max(…week.map(x=>x.count)),‘reps’,myColor),StatCard(‘Goal days’,week.filter(d=>d.count>=goal).length,’/ 7’,’#10b981’));
wrap.appendChild(grid);
return wrap;
}

// ── Month view ─────────────────────────────────────────────────────────────
function renderMonth(myColor) {
const {weeks,monthTotal} = getStats();
const myData = shared.users[currentUser]||{goal:50,log:{}};
const goal = myData.goal||50;
const wrap = el(‘div’,{style:s({width:‘100%’,maxWidth:‘420px’,padding:‘24px 20px 0’,animation:‘slideUp 0.3s ease’})});
wrap.appendChild(el(‘div’,{style:s({fontSize:‘11px’,color:’#444’,letterSpacing:‘0.15em’,marginBottom:‘4px’})},‘THIS MONTH’));
wrap.appendChild(el(‘div’,{style:s({fontFamily:”‘Bebas Neue’”,fontSize:‘40px’,color:myColor,marginBottom:‘24px’})},`${monthTotal} REPS`));
const bars = el(‘div’,{style:s({display:‘flex’,gap:‘3px’,alignItems:‘flex-end’,background:’#0f0f0f’,borderRadius:‘16px’,padding:‘20px 12px 12px’})});
weeks.forEach(w=>bars.appendChild(BarChart(w.total,Math.max(…weeks.map(x=>x.total),goal*7),myColor,w.label,goal*7)));
wrap.appendChild(bars);
const grid = el(‘div’,{style:s({marginTop:‘24px’,display:‘grid’,gridTemplateColumns:‘1fr 1fr’,gap:‘12px’})});
grid.append(StatCard(‘Monthly total’,monthTotal,‘reps’,myColor),StatCard(‘Weekly avg’,Math.round(monthTotal/4),‘reps/wk’,myColor),StatCard(‘Goal weeks’,weeks.filter(w=>w.total>=goal*7).length,’/ 4 wks’,’#10b981’),StatCard(‘Daily avg’,Math.round(monthTotal/new Date().getDate()),‘reps/day’,myColor));
wrap.appendChild(grid);
return wrap;
}

// ── Year view ──────────────────────────────────────────────────────────────
function renderYear(myColor) {
const {yearMonths,yearTotal} = getStats();
const wrap = el(‘div’,{style:s({width:‘100%’,maxWidth:‘420px’,padding:‘24px 20px 0’,animation:‘slideUp 0.3s ease’})});
wrap.appendChild(el(‘div’,{style:s({fontSize:‘11px’,color:’#444’,letterSpacing:‘0.15em’,marginBottom:‘4px’})},‘THIS YEAR’));
wrap.appendChild(el(‘div’,{style:s({fontFamily:”‘Bebas Neue’”,fontSize:‘40px’,color:myColor,marginBottom:‘24px’})},`${yearTotal.toLocaleString()} REPS`));
const bars = el(‘div’,{style:s({display:‘flex’,gap:‘4px’,alignItems:‘flex-end’,background:’#0f0f0f’,borderRadius:‘16px’,padding:‘20px 12px 12px’,overflowX:‘auto’})});
yearMonths.forEach(m=>bars.appendChild(BarChart(m.total,Math.max(…yearMonths.map(x=>x.total),1),myColor,m.label)));
wrap.appendChild(bars);
const grid = el(‘div’,{style:s({marginTop:‘24px’,display:‘grid’,gridTemplateColumns:‘1fr 1fr’,gap:‘12px’})});
const pace = Math.round(yearTotal/(new Date().getDate()+new Date().getMonth()*30.4)*365);
grid.append(StatCard(‘Year total’,yearTotal.toLocaleString(),‘reps’,myColor),StatCard(‘Monthly avg’,Math.round(yearTotal/Math.max(new Date().getMonth()+1,1)),‘reps/mo’,myColor),StatCard(‘Best month’,Math.max(…yearMonths.map(x=>x.total)),‘reps’,myColor),StatCard(‘On pace for’,pace.toLocaleString(),’/ yr’,’#10b981’));
wrap.appendChild(grid);
return wrap;
}

// ── Crew view ──────────────────────────────────────────────────────────────
function renderCrew(myColor) {
const today = todayKey();
const now = new Date();
const allNames = Object.keys(shared.users);
const challenge = shared.groupChallenge || {goal:1000,name:‘Family Challenge’};
const members = Object.entries(shared.users).map(([name,ud])=>{
const log=ud.log||{};
const todayReps=log[today]||0;
const goal=ud.goal||50;
const weekTotal=Array.from({length:7},(_,i)=>{const d=new Date(now);d.setDate(d.getDate()-i);return log[d.toISOString().split(“T”)[0]]||0;}).reduce((a,b)=>a+b,0);
const allReps=Object.values(log).reduce((a,b)=>a+b,0);
return {name,todayReps,goal,weekTotal,allReps,color:memberColor(name,allNames)};
}).sort((a,b)=>b.todayReps-a.todayReps);

const groupTotal = members.reduce((a,m)=>a+m.allReps,0);
const groupPct = Math.min((groupTotal/challenge.goal)*100,100);
const groupHit = groupTotal>=challenge.goal;
const maxWeek = Math.max(…members.map(m=>m.weekTotal),1);

const wrap = el(‘div’,{style:s({width:‘100%’,maxWidth:‘420px’,padding:‘24px 20px 0’})});

// Group challenge
const chalCard = el(‘div’,{style:s({background:groupHit?‘linear-gradient(135deg,#052e16,#064e3b)’:’#0f0f0f’,border:`1px solid ${groupHit?'#10b98133':'#2a2a2a'}`,borderRadius:‘16px’,padding:‘20px’,marginBottom:‘20px’})});
const chalHeader = el(‘div’,{style:s({display:‘flex’,justifyContent:‘space-between’,alignItems:‘flex-start’,marginBottom:‘14px’})});
chalHeader.appendChild(el(‘div’,{},
el(‘div’,{style:s({fontSize:‘10px’,color:’#444’,letterSpacing:‘0.15em’,marginBottom:‘4px’})},‘GROUP CHALLENGE’),
el(‘div’,{style:s({fontFamily:”‘Bebas Neue’”,fontSize:‘20px’,color:groupHit?’#10b981’:’#e8e8e8’,letterSpacing:‘1px’})},challenge.name)
));
const editBtn = el(‘button’,{style:s({background:‘none’,border:‘1px solid #2a2a2a’,color:’#444’,fontFamily:‘inherit’,fontSize:‘11px’,padding:‘4px 10px’,borderRadius:‘6px’,cursor:‘pointer’}),
onClick:()=>{
const newName = prompt(‘Challenge name:’,challenge.name);
const newGoal = parseInt(prompt(‘Challenge goal (reps):’,String(challenge.goal)));
if(newGoal>0){ shared={…shared,groupChallenge:{goal:newGoal,name:newName||challenge.name}}; saveToFirebase(); }
}
},‘✎ EDIT’);
chalHeader.appendChild(editBtn);
chalCard.appendChild(chalHeader);

const chalNums = el(‘div’,{style:s({display:‘flex’,justifyContent:‘space-between’,alignItems:‘flex-end’,marginBottom:‘10px’})});
chalNums.append(
el(‘div’,{},el(‘div’,{style:s({fontFamily:”‘Bebas Neue’”,fontSize:‘38px’,color:groupHit?’#10b981’:’#f59e0b’,lineHeight:‘1’})},groupTotal.toLocaleString()),el(‘div’,{style:s({fontSize:‘10px’,color:’#444’})},‘TOTAL REPS’)),
el(‘div’,{style:s({textAlign:‘right’})},el(‘div’,{style:s({fontSize:‘10px’,color:’#444’,marginBottom:‘2px’})},‘GOAL’),el(‘div’,{style:s({fontFamily:”‘Bebas Neue’”,fontSize:‘22px’,color:’#333’})},challenge.goal.toLocaleString()))
);
chalCard.appendChild(chalNums);

const progBar = el(‘div’,{style:s({background:’#1a1a1a’,borderRadius:‘8px’,height:‘10px’,overflow:‘hidden’,marginBottom:‘6px’})});
progBar.appendChild(el(‘div’,{style:s({height:‘100%’,width:`${groupPct}%`,background:groupHit?‘linear-gradient(90deg,#10b981,#34d399)’:‘linear-gradient(90deg,#f59e0b,#fbbf24)’,borderRadius:‘8px’,transition:‘width 0.6s ease’})}));
chalCard.appendChild(progBar);
chalCard.appendChild(el(‘div’,{style:s({display:‘flex’,justifyContent:‘space-between’,fontSize:‘10px’,color:’#444’,marginBottom:‘14px’})},
el(‘span’,{},`${Math.round(groupPct)}% of goal`),el(‘span’,{},groupHit?‘🏆 COMPLETE!’:((challenge.goal-groupTotal).toLocaleString()+’ to go’))
));

const stackBar = el(‘div’,{style:s({display:‘flex’,borderRadius:‘6px’,overflow:‘hidden’,height:‘8px’,marginBottom:‘8px’})});
members.filter(m=>m.allReps>0).forEach(m=>{ const d=el(‘div’,{style:s({height:‘100%’,width:`${(m.allReps/Math.max(groupTotal,1))*100}%`,background:m.color})}); stackBar.appendChild(d); });
chalCard.appendChild(stackBar);

const legend = el(‘div’,{style:s({display:‘flex’,flexWrap:‘wrap’,gap:‘6px 14px’})});
members.forEach(m=>{ legend.appendChild(el(‘div’,{style:s({display:‘flex’,alignItems:‘center’,gap:‘5px’,fontSize:‘10px’,color:’#555’})},el(‘div’,{style:s({width:‘8px’,height:‘8px’,borderRadius:‘50%’,background:m.color})}),`${m.name} · ${m.allReps}`)); });
chalCard.appendChild(legend);
wrap.appendChild(chalCard);

// Leaderboard
wrap.appendChild(el(‘div’,{style:s({fontSize:‘11px’,color:’#444’,letterSpacing:‘0.15em’,marginBottom:‘12px’})},“TODAY’S LEADERBOARD”));
const lb = el(‘div’,{style:s({display:‘flex’,flexDirection:‘column’,gap:‘8px’,marginBottom:‘28px’})});
members.forEach((m,i)=>{
const pct=Math.min((m.todayReps/Math.max(m.goal,1))*100,100);
const hit=m.todayReps>=m.goal;
const isMe=m.name===currentUser;
const card = el(‘div’,{style:s({background:isMe?’#111’:’#0d0d0d’,border:`1px solid ${isMe?m.color+'55':'#1a1a1a'}`,borderRadius:‘12px’,padding:‘12px 16px’})});
const row = el(‘div’,{style:s({display:‘flex’,alignItems:‘center’,gap:‘12px’,marginBottom:‘8px’})});
row.append(
el(‘div’,{style:s({fontFamily:”‘Bebas Neue’”,fontSize:‘20px’,color:i===0?’#f59e0b’:’#2a2a2a’,minWidth:‘22px’})},i===0?‘🥇’:i===1?‘🥈’:i===2?‘🥉’:String(i+1)),
Avatar(m.name,m.color,30),
el(‘div’,{style:s({flex:‘1’})},
el(‘div’,{style:s({fontSize:‘13px’,color:isMe?’#e8e8e8’:’#777’,fontWeight:isMe?‘700’:‘400’})},m.name+(isMe?’ (you)’:’’)),
el(‘div’,{style:s({fontSize:‘10px’,color:’#333’})},`goal: ${m.goal}`)
),
el(‘div’,{style:s({textAlign:‘right’})},
el(‘div’,{style:s({fontFamily:”‘Bebas Neue’”,fontSize:‘26px’,color:hit?’#10b981’:m.color,lineHeight:‘1’})},String(m.todayReps)),
hit?el(‘div’,{style:s({fontSize:‘9px’,color:’#10b981’})},‘✓ DONE’):el(‘span’,{})
)
);
const pb=el(‘div’,{style:s({background:’#1a1a1a’,borderRadius:‘6px’,height:‘5px’,overflow:‘hidden’})});
pb.appendChild(el(‘div’,{style:s({height:‘100%’,width:`${pct}%`,background:hit?’#10b981’:m.color,borderRadius:‘6px’,transition:‘width 0.5s ease’})}));
card.append(row,pb);
lb.appendChild(card);
});
wrap.appendChild(lb);

// Head to head
wrap.appendChild(el(‘div’,{style:s({fontSize:‘11px’,color:’#444’,letterSpacing:‘0.15em’,marginBottom:‘12px’})},‘THIS WEEK — HEAD TO HEAD’));
const hth = el(‘div’,{style:s({background:’#0f0f0f’,borderRadius:‘16px’,padding:‘20px 16px 12px’,display:‘flex’,gap:‘8px’,marginBottom:‘6px’})});
members.forEach(m=>{
const h=maxWeek>0?Math.max((m.weekTotal/maxWeek)*100,m.weekTotal>0?4:0):0;
const col = el(‘div’,{style:s({flex:‘1’,display:‘flex’,flexDirection:‘column’,alignItems:‘center’,gap:‘4px’})});
col.append(
el(‘div’,{style:s({fontSize:‘11px’,color:m.color,fontFamily:‘monospace’})},m.weekTotal||’’),
el(‘div’,{style:s({width:‘100%’,height:‘80px’,display:‘flex’,alignItems:‘flex-end’,justifyContent:‘center’})},
el(‘div’,{style:s({width:‘62%’,height:`${h}%`,background:m.color,borderRadius:‘4px 4px 0 0’,transition:‘height 0.5s ease’,minHeight:m.weekTotal>0?‘4px’:‘0’,opacity:m.name===currentUser?‘1’:‘0.5’})})
),
el(‘div’,{style:s({fontSize:‘10px’,color:m.name===currentUser?’#e8e8e8’:’#555’,textAlign:‘center’,maxWidth:‘48px’,overflow:‘hidden’,textOverflow:‘ellipsis’,whiteSpace:‘nowrap’})},m.name)
);
hth.appendChild(col);
});
wrap.appendChild(hth);
wrap.appendChild(el(‘div’,{style:s({fontSize:‘10px’,color:’#2a2a2a’,textAlign:‘center’,marginBottom:‘32px’})},‘last 7 days’));
return wrap;
}

// ── Main render ────────────────────────────────────────────────────────────
function render() {
const root = document.getElementById(‘root’);
root.innerHTML = ‘’;

if(!currentUser) { root.appendChild(renderLogin()); return; }

const allNames = Object.keys(shared.users);
const myColor = memberColor(currentUser, allNames);

const app = el(‘div’,{style:s({minHeight:‘100vh’,background:’#0a0a0a’,fontFamily:”‘DM Mono’,‘Courier New’,monospace”,color:’#e8e8e8’,display:‘flex’,flexDirection:‘column’,alignItems:‘center’,paddingBottom:‘60px’})});

// Header
const header = el(‘div’,{style:s({width:‘100%’,maxWidth:‘420px’,padding:‘26px 20px 0’,display:‘flex’,justifyContent:‘space-between’,alignItems:‘flex-end’})});
header.append(
el(‘div’,{},
el(‘div’,{style:s({fontSize:‘10px’,letterSpacing:‘0.2em’,color:’#444’})},‘FAMILY CREW’),
el(‘div’,{style:s({fontFamily:”‘Bebas Neue’”,fontSize:‘42px’,color:myColor,lineHeight:‘1’,letterSpacing:‘2px’})},‘PUSH-UPS’)
),
el(‘button’,{style:s({display:‘flex’,alignItems:‘center’,gap:‘8px’,background:‘none’,border:‘1px solid #1e1e1e’,borderRadius:‘20px’,padding:‘6px 14px’,color:’#555’,fontFamily:‘inherit’,fontSize:‘11px’,cursor:‘pointer’}),
onClick:()=>{ clearSession(); currentUser=null; render(); }
}, Avatar(currentUser,myColor,22), currentUser)
);
app.appendChild(header);
app.appendChild(renderNav(myColor));

if(currentView===‘today’) app.appendChild(renderToday(myColor));
else if(currentView===‘week’) app.appendChild(renderWeek(myColor));
else if(currentView===‘month’) app.appendChild(renderMonth(myColor));
else if(currentView===‘year’) app.appendChild(renderYear(myColor));
else if(currentView===‘crew’) app.appendChild(renderCrew(myColor));

root.appendChild(app);
}

// ── Boot ───────────────────────────────────────────────────────────────────
document.getElementById(‘root’).innerHTML = ‘<div class="loading">LOADING…</div>’;
startListening();
</script>
