function memberColor(name,allNames){return COLORS[allNames.slice().sort().indexOf(name)%COLORS.length];}
function todayKey(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
 
function saveToFirebase(){
  return db.collection("family").doc("shared").set(shared);
}
 
function startListening(){
  if(unsubscribe)unsubscribe();
  unsubscribe=db.collection("family").doc("shared").onSnapshot(function(snap){
    if(snap.exists){shared=snap.data();}
    render();
  },function(err){
    console.error("Firebase error:",err);
    render();
  });
}
 
function el(tag,props,children){
  var e=document.createElement(tag);
  if(!props)props={};
  if(!children)children=[];
  Object.keys(props).forEach(function(k){
    var v=props[k];
    if(k==="style"&&typeof v==="object"){Object.assign(e.style,v);}
    else if(k.indexOf("on")===0){e.addEventListener(k.slice(2).toLowerCase(),v);}
    else if(k==="className"){e.className=v;}
    else{e.setAttribute(k,v);}
  });
  if(!Array.isArray(children))children=[children];
  children.forEach(function(c){
    if(c!=null){e.appendChild(typeof c==="string"?document.createTextNode(c):c);}
  });
  return e;
}
 
function showConfetti(){
  var colors=["#f59e0b","#10b981","#3b82f6","#f43f5e","#a855f7","#fff","#fb923c"];
  var wrap=el("div",{style:{position:"fixed",inset:"0",pointerEvents:"none",zIndex:"200"}});
  for(var i=0;i<36;i++){
    wrap.appendChild(el("div",{style:{position:"absolute",left:(Math.random()*100)+"%",top:"-20px",width:(6+Math.random()*9)+"px",height:(6+Math.random()*9)+"px",borderRadius:Math.random()>.5?"50%":"2px",background:colors[Math.floor(Math.random()*colors.length)],animation:"confettiFall "+(1.5+Math.random()*1.5)+"s "+(Math.random()*.6)+"s ease-in forwards",transform:"rotate("+(Math.random()*360)+"deg)"}}));
  }

function Avatar(name,color,size){

function StatCard(label,value,unit,color){

function BarEl(value,max,color,label,goal){
  var h=max>0?Math.max((value/max)*100,value>0?4:0):0;
  var hit=goal&&value>=goal;
  return el("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:"4px",flex:"1"}},[

    el("div",{style:{width:"100%",height:"80px",display:"flex",alignItems:"flex-end",justifyContent:"center"}},[

    ]),

function getStats(){
  var log=(shared.users[currentUser]||{}).log||{};
  var now=new Date();
  var week=[];
  for(var i=0;i<7;i++){var d=new Date(now);d.setDate(d.getDate()-(6-i));var k=d.toISOString().split("T")[0];week.push({label:["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()],count:log[k]||0,key:k});}
  var weeks=[];
  for(var i=0;i<4;i++){var s2=new Date(now);s2.setDate(s2.getDate()-s2.getDay()-i*7);var total=0;for(var j=0;j<7;j++){var d2=new Date(s2);d2.setDate(s2.getDate()+j);total+=log[d2.toISOString().split("T")[0]]||0;}weeks.unshift({label:"W"+(4-i),total:total});}
  var monthTotal=0;for(var i=0;i<now.getDate();i++){var d3=new Date(now.getFullYear(),now.getMonth(),i+1);monthTotal+=log[d3.toISOString().split("T")[0]]||0;}
  var yearMonths=[];
  for(var m=0;m<=now.getMonth();m++){var yt=0;var days=new Date(now.getFullYear(),m+1,0).getDate();for(var d4=1;d4<=days;d4++){yt+=log[now.getFullYear()+"-"+String(m+1).padStart(2,"0")+"-"+String(d4).padStart(2,"0")]||0;}yearMonths.push({label:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][m],total:yt});}
  return{week:week,weeks:weeks,monthTotal:monthTotal,yearTotal:yearMonths.reduce(function(a,b){return a+b.total;},0),yearMonths:yearMonths};
}
 
function updateMy(fn){
  var prev=shared.users[currentUser]||{goal:50,log:{}};
  var newUsers=Object.assign({},shared.users);
  newUsers[currentUser]=fn(prev);
  shared=Object.assign({},shared,{users:newUsers});
  saveToFirebase();
}
 
function renderLogin(){

        btn.addEventListener("mouseenter",function(){btn.style.borderColor=COLORS[i%COLORS.length];});
        btn.addEventListener("mouseleave",function(){btn.style.borderColor="#1e1e1e";});

  }
  renderModeRow();renderForm();

function doLogin(name){
  localStorage.setItem(SESSION_KEY,name);
  currentUser=name;justCelebrated=false;prevTodayCount=0;
  if(!shared.users[name]){
    var newUsers=Object.assign({},shared.users);
    newUsers[name]={goal:50,log:{}};
    shared=Object.assign({},shared,{users:newUsers});
    saveToFirebase();
  } else {
    render();
  }
}

  var members=[];

  nums.appendChild(el("div",{style:{textAlign:"right"}},[el("div",{style:{fontSize:"10px",color:"#444",marginBottom:"2px"}},["GOAL"]),el("div",{style:{fontFamily:"'Bebas Neue'",fontSize:"22px",color:"#333"}},[challenge.goal.toLocaleString()])]));
  card.appendChild(nums);
  var pb=el("div",{style:{background:"#1a1a1a",borderRadius:"8px",height:"10px",overflow:"hidden",marginBottom:"6px"}});

  card.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"10px",color:"#444",marginBottom:"14px"}},[el("span",{},[Math.round(groupPct)+"% of goal"]),el("span",{},[groupHit?"🏆 COMPLETE!":((challenge.goal-groupTotal).toLocaleString()+" to go")])]));
  var stack=el("div",{style:{display:"flex",borderRadius:"6px",overflow:"hidden",height:"8px",marginBottom:"8px"}});
  members.filter(function(m){return m.allReps>0;}).forEach(function(m){stack.appendChild(el("div",{style:{height:"100%",width:((m.allReps/Math.max(groupTotal,1))*100)+"%",background:m.color}}));});
  card.appendChild(stack);
  var leg=el("div",{style:{display:"flex",flexWrap:"wrap",gap:"6px 14px"}});
  members.forEach(function(m){leg.appendChild(el("div",{style:{display:"flex",alignItems:"center",gap:"5px",fontSize:"10px",color:"#555"}},[el("div",{style:{width:"8px",height:"8px",borderRadius:"50%",background:m.color}}),m.name+" - "+m.allReps]));});

    var c=el("div",{style:{background:isMe?"#111":"#0d0d0d",border:"1px solid "+(isMe?m.color+"55":"#1a1a1a"),borderRadius:"12px",padding:"12px 16px"}});

  wrap.appendChild(lb);
  wrap.appendChild(el("div",{style:{fontSize:"11px",color:"#444",letterSpacing:"0.15em",marginBottom:"12px"}},["THIS WEEK - HEAD TO HEAD"]));
  var hth=el("div",{style:{background:"#0f0f0f",borderRadius:"16px",padding:"20px 16px 12px",display:"flex",gap:"8px",marginBottom:"32px"}});

      row2.appendChild(el("div",{style:{display:"flex",alignItems:"center",gap:"10px"}},[Avatar(m.name,m.color,28),el("div",{style:{fontSize:"13px",color:"#888"}},[m.name])]));
      var removeBtn=el("button",{style:{background:"none",border:"1px solid #f43f5e44",color:"#f43f5e",fontFamily:"inherit",fontSize:"11px",padding:"4px 12px",borderRadius:"6px",cursor:"pointer"},onClick:function(){
        if(confirm("Remove "+m.name+" from the crew? This will delete all their data.")){
